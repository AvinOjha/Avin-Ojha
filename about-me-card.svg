<svg viewBox="0 0 900 760" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#141321"/>
      <stop offset="55%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#20203a"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fe428e"/>
      <stop offset="100%" stop-color="#f8d847"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="900" height="760" rx="26" fill="url(#bgGrad)"/>

  <!-- decorative glow circles -->
  <circle cx="860" cy="30" r="120" fill="#fe428e" opacity="0.06"/>
  <circle cx="20" cy="740" r="150" fill="#a9fef7" opacity="0.05"/>
  <circle cx="850" cy="700" r="90" fill="#f8d847" opacity="0.05"/>

  <!-- Header -->
  <text x="40" y="62" font-size="38" font-family="Segoe UI, Helvetica, Arial, sans-serif">💫</text>
  <text x="95" y="60" font-size="34" font-weight="800" fill="#ffffff" font-family="Segoe UI, Helvetica, Arial, sans-serif">About Me</text>
  <rect x="40" y="80" width="820" height="3" rx="1.5" fill="url(#accentGrad)"/>

  <!-- Intro -->
  <text x="40" y="122" font-size="16" fill="#c9c9d9" font-family="Segoe UI, Helvetica, Arial, sans-serif">I'm Avin Ojha, an Engineering student with a passion for</text>
  <text x="40" y="147" font-size="16" fill="#c9c9d9" font-family="Segoe UI, Helvetica, Arial, sans-serif">Artificial Intelligence and Web Development.</text>

  <!-- Tech Stack header -->
  <text x="40" y="200" font-size="26" font-family="Segoe UI, Helvetica, Arial, sans-serif">🛠</text>
  <text x="76" y="198" font-size="22" font-weight="700" fill="#ffffff" font-family="Segoe UI, Helvetica, Arial, sans-serif">Tech Stack</text>

  <!-- Pill 1: Languages -->
  <rect x="40" y="222" width="820" height="46" rx="10" fill="#1f1f33" stroke="#2d2d45" stroke-width="1"/>
  <rect x="40" y="222" width="6" height="46" rx="3" fill="#fe428e"/>
  <text x="66" y="241" font-size="11" font-weight="700" letter-spacing="1.5" fill="#fe428e" font-family="Segoe UI, Helvetica, Arial, sans-serif">LANGUAGES</text>
  <text x="66" y="260" font-size="15" fill="#e8e8f0" font-family="Segoe UI, Helvetica, Arial, sans-serif">Python, C, C++, JavaScript</text>

  <!-- Pill 2: Web -->
  <rect x="40" y="280" width="820" height="46" rx="10" fill="#1f1f33" stroke="#2d2d45" stroke-width="1"/>
  <rect x="40" y="280" width="6" height="46" rx="3" fill="#a9fef7"/>
  <text x="66" y="299" font-size="11" font-weight="700" letter-spacing="1.5" fill="#a9fef7" font-family="Segoe UI, Helvetica, Arial, sans-serif">WEB</text>
  <text x="66" y="318" font-size="15" fill="#e8e8f0" font-family="Segoe UI, Helvetica, Arial, sans-serif">HTML5, CSS3, Flask</text>

  <!-- Pill 3: Databases -->
  <rect x="40" y="338" width="820" height="46" rx="10" fill="#1f1f33" stroke="#2d2d45" stroke-width="1"/>
  <rect x="40" y="338" width="6" height="46" rx="3" fill="#f8d847"/>
  <text x="66" y="357" font-size="11" font-weight="700" letter-spacing="1.5" fill="#f8d847" font-family="Segoe UI, Helvetica, Arial, sans-serif">DATABASES</text>
  <text x="66" y="376" font-size="15" fill="#e8e8f0" font-family="Segoe UI, Helvetica, Arial, sans-serif">Supabase</text>

  <!-- Pill 4: Hardware -->
  <rect x="40" y="396" width="820" height="46" rx="10" fill="#1f1f33" stroke="#2d2d45" stroke-width="1"/>
  <rect x="40" y="396" width="6" height="46" rx="3" fill="#b537f2"/>
  <text x="66" y="415" font-size="11" font-weight="700" letter-spacing="1.5" fill="#b537f2" font-family="Segoe UI, Helvetica, Arial, sans-serif">HARDWARE</text>
  <text x="66" y="434" font-size="15" fill="#e8e8f0" font-family="Segoe UI, Helvetica, Arial, sans-serif">Arduino</text>

  <!-- Projects header -->
  <text x="40" y="486" font-size="26" font-family="Segoe UI, Helvetica, Arial, sans-serif">🚀</text>
  <text x="76" y="484" font-size="22" font-weight="700" fill="#ffffff" font-family="Segoe UI, Helvetica, Arial, sans-serif">Projects</text>

  <!-- Project Card 1 -->
  <rect x="40" y="508" width="820" height="62" rx="10" fill="#1f1f33" stroke="#2d2d45" stroke-width="1"/>
  <rect x="40" y="508" width="6" height="62" rx="3" fill="#a9fef7"/>
  <text x="66" y="531" font-size="16" font-weight="700" fill="#a9fef7" font-family="Segoe UI, Helvetica, Arial, sans-serif">DoubtAI</text>
  <text x="66" y="553" font-size="14" fill="#c9c9d9" font-family="Segoe UI, Helvetica, Arial, sans-serif">AI-powered student companion with RAG and paper prediction.</text>

  <!-- Project Card 2 -->
  <rect x="40" y="584" width="820" height="62" rx="10" fill="#1f1f33" stroke="#2d2d45" stroke-width="1"/>
  <rect x="40" y="584" width="6" height="62" rx="3" fill="#fe428e"/>
  <text x="66" y="607" font-size="16" font-weight="700" fill="#fe428e" font-family="Segoe UI, Helvetica, Arial, sans-serif">Automated Bill Calculator</text>
  <text x="66" y="629" font-size="14" fill="#c9c9d9" font-family="Segoe UI, Helvetica, Arial, sans-serif">Web-based bill management tool.</text>

  <!-- Project Card 3 -->
  <rect x="40" y="660" width="820" height="62" rx="10" fill="#1f1f33" stroke="#2d2d45" stroke-width="1"/>
  <rect x="40" y="660" width="6" height="62" rx="3" fill="#f8d847"/>
  <text x="66" y="683" font-size="16" font-weight="700" fill="#f8d847" font-family="Segoe UI, Helvetica, Arial, sans-serif">Arduino Distance System</text>
  <text x="66" y="705" font-size="14" fill="#c9c9d9" font-family="Segoe UI, Helvetica, Arial, sans-serif">Sensor-based measurement project.</text>
</svg>
